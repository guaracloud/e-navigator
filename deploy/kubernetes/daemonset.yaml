apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: e-navigator
  namespace: e-navigator-system
  labels:
    app.kubernetes.io/name: e-navigator
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 10%
  minReadySeconds: 10
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: e-navigator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: e-navigator
    spec:
      serviceAccountName: e-navigator
      automountServiceAccountToken: true
      hostPID: false
      hostNetwork: false
      dnsPolicy: ClusterFirst
      terminationGracePeriodSeconds: 30
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - operator: Exists
      affinity: {}
      containers:
        - name: e-navigator
          image: ghcr.io/guaracloud/e-navigator:0.3.0-rc.1
          imagePullPolicy: IfNotPresent
          args:
            - "--source"
            - "unified"
            - "--config"
            - "/etc/e-navigator/e-navigator.toml"
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "info"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: false
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsUser: 0
            runAsNonRoot: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
              add:
                - BPF
                - SYS_PTRACE
                - NET_RAW
                - PERFMON
                - DAC_READ_SEARCH
                - CHECKPOINT_RESTORE
                - SYS_ADMIN
                - NET_ADMIN
                - SYS_RESOURCE
                - SYSLOG
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              cpu: "2"
              memory: 960Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            failureThreshold: 30
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 2
          volumeMounts:
            - name: config
              mountPath: /etc/e-navigator
              readOnly: true
            - name: sys-kernel-debug
              mountPath: /sys/kernel/debug
              readOnly: true
            - name: sys-kernel-tracing
              mountPath: /sys/kernel/tracing
              readOnly: true
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-cgroup
              mountPath: /host/cgroup
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: e-navigator-config
        - name: sys-kernel-debug
          hostPath:
            path: /sys/kernel/debug
            type: Directory
        - name: sys-kernel-tracing
          hostPath:
            path: /sys/kernel/tracing
            type: Directory
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        - name: host-cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
