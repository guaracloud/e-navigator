{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "e-navigator.clusterRoleName" . }}
  labels:
    {{- include "e-navigator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "e-navigator.clusterRoleName" . }}
  labels:
    {{- include "e-navigator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "e-navigator.clusterRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "e-navigator.serviceAccountName" . }}
    namespace: {{ include "e-navigator.namespace" . }}
{{- end }}
