{{- if and .Values.service.enabled (or .Values.prometheusHttp.enabled .Values.health.enabled) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "e-navigator.fullname" . }}
  namespace: {{ include "e-navigator.namespace" . }}
  labels:
    {{- include "e-navigator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "e-navigator.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
{{- end }}
