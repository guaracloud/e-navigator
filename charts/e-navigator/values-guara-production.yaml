# Opinionated Guara Cloud replacement preset.
#
# This file intentionally does not pin an image. A production rollout must
# supply a release-manifest-verified `image.digest`; see documentation/helm.md.
# It replaces the Beyla plus Alloy-profiles collection tier while preserving
# Guara's existing Alloy, Tempo, Prometheus, and Pyroscope backends.

namespace:
  create: false
  name: guara-observability

commonLabels:
  app.kubernetes.io/part-of: guara-observability

config:
  toml: |
    log_level = "info"
    queue_capacity = 8192

    [source_supervisor]
    failure_policy = "isolate"
    shutdown_timeout_millis = 20000

    [argv_capture]
    enabled = false

    [attribution]
    procfs_root = "/host/proc"
    cgroup_root = "/host/cgroup"

    [attribution.kubernetes]
    enabled = true
    require_node_name = false
    allow_cluster_wide_pod_list = true
    token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    ca_cert_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    max_response_bytes = 4194304
    max_pods = 4096
    max_cache_entries = 16384
    max_labels_per_pod = 32

    [capture_filter]
    enabled = true
    default_posture = "deny"
    unknown_cgroup = "deny"
    namespace_include = ["proj-*"]
    label_in = { "guara.cloud/tier" = ["starter", "pro", "business", "enterprise"] }
    label_not_exists = ["guara.cloud/catalog-slug"]
    process_exclude = ["*-exporter", "*_exporter", "*/redis_exporter", "*/mongodb_exporter", "*/postgres_exporter", "*/node_exporter", "otelcol*", "alloy*", "beyla*", "e-navigator*"]

    [resource_source]
    procfs_root = "/host/proc"
    sysfs_root = "/sys"
    cgroup_root = "/host/cgroup"
    sample_interval_millis = 60000
    max_processes = 4096
    max_cgroups = 4096
    max_fds_per_process = 1024
    max_file_bytes = 131072

    [dns_source]
    max_packet_bytes = 512
    max_preview_bytes = 160

    [http_source]
    max_header_bytes = 8192
    max_request_line_bytes = 1024
    max_attributes = 16
    max_tracestate_bytes = 512
    inbound_enabled = true

    [protocol_source]
    http1_ports = []
    http2_ports = [50051]
    kafka_ports = [9092]
    mongodb_ports = [27017]
    mysql_ports = [3306]
    nats_ports = [4222]
    postgresql_ports = [5432]
    redis_ports = [6379]
    max_buffered_bytes_per_connection = 8192
    capture_bytes_per_syscall = 1024
    max_tracked_connections = 8192
    max_attributes = 16

    [tls_source]
    http1_ports = [443]
    http2_ports = [8443]
    kafka_ports = [9093]
    mongodb_ports = [27018]
    mysql_ports = [3307]
    nats_ports = [4223]
    postgresql_ports = [5433]
    redis_ports = [6380]
    capture_bytes_per_call = 1024
    max_tracked_connections = 8192
    max_buffered_bytes_per_connection = 8192
    max_attributes = 16

    [cpu_profile_source]
    enabled = true
    module_name = "source.aya_cpu_profile"
    sample_frequency_hz = 10
    max_active_targets = 128
    max_frames_per_sample = 96
    max_samples_per_batch = 128
    max_symbol_bytes = 256
    max_module_bytes = 256
    max_file_bytes = 256
    backpressure = "drop_newest"
    symbolize = true
    resolve_symbol_names = true
    dwarf_unwind = true
    max_unwind_processes = 256

    [resource_metrics]
    max_keys = 4096

    [network_metrics]
    max_metric_keys = 4096
    max_active_connections = 8192

    [dns_metrics]
    max_domains = 1024

    [trace_correlation]
    max_service_paths = 4096
    max_seen_interactions = 8192
    max_warnings = 1024

    [request_correlation]
    generate_trace_ids = true
    max_seen_requests = 8192
    max_warnings = 1024

    [profiling]
    max_windows = 4096
    max_seen_samples = 8192
    max_warnings = 1024
    window_nanos = 30000000000

    [prometheus_http]
    enabled = true
    bind_address = "0.0.0.0"
    port = 9090
    max_metric_lines = 4096
    metrics_enabled = true
    profiles_enabled = true

    [otlp_http]
    enabled = true
    endpoint = ""
    metrics_endpoint = "http://alloy.guara-observability.svc.cluster.local:4318/v1/metrics"
    traces_endpoint = "http://alloy.guara-observability.svc.cluster.local:4318/v1/traces"
    profiles_endpoint = "http://pyroscope.guara-observability.svc.cluster.local:4040/v1development/profiles"
    metrics_enabled = true
    traces_enabled = true
    profiles_enabled = true
    queue_capacity = 8192
    batch_size = 4096
    flush_interval_millis = 1000
    timeout_millis = 3000
    max_retries = 3
    compression = "gzip"
    retry_initial_backoff_millis = 100
    retry_max_backoff_millis = 5000
    circuit_breaker_failure_threshold = 5
    circuit_breaker_cooldown_millis = 30000
    shutdown_timeout_millis = 20000
    tls_insecure_skip_verify = false

    [[modules]]
    name = "source.aya_exec"
    enabled = true

    [[modules]]
    name = "source.aya_network"
    enabled = true

    [[modules]]
    name = "source.aya_dns"
    enabled = true

    [[modules]]
    name = "source.aya_http"
    enabled = true

    [[modules]]
    name = "source.aya_protocol"
    enabled = true

    [[modules]]
    name = "source.aya_tls"
    enabled = true

    [[modules]]
    name = "source.aya_cpu_profile"
    enabled = true

    [[modules]]
    name = "source.host_resource"
    enabled = true

    [[modules]]
    name = "source.synthetic_exec"
    enabled = false

    [[modules]]
    name = "processor.container_attribution"
    enabled = true

    [[modules]]
    name = "generator.resource_metrics"
    enabled = true

    [[modules]]
    name = "generator.network_metrics"
    enabled = true

    [[modules]]
    name = "generator.dns_metrics"
    enabled = true

    [[modules]]
    name = "generator.trace_correlation"
    enabled = true

    [[modules]]
    name = "generator.request_correlation"
    enabled = true

    [[modules]]
    name = "generator.profiling"
    enabled = true

    [[modules]]
    name = "generator.dependency_graph"
    enabled = true

    [[modules]]
    name = "generator.runtime_security"
    enabled = true

    [[modules]]
    name = "sink.json_stdout"
    enabled = false

    [[modules]]
    name = "sink.prometheus_http"
    enabled = true

    [[modules]]
    name = "sink.otlp_http"
    enabled = true

features:
  metrics: true
  traces: true
  profiles: true
  protocolProbes: true

podLabels:
  observability.guara.cloud/collector: e-navigator

hostPID: true

prometheusHttp:
  enabled: true

health:
  enabled: true

service:
  enabled: true
  type: ClusterIP
  port: 9090
  targetPort: 9090

serviceMonitor:
  enabled: true
  interval: 60s
  scrapeTimeout: 10s

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: guara.cloud/role
              operator: NotIn
              values:
                - build
