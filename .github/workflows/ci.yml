name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install eBPF build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm
          rustup toolchain install nightly --component rust-src
          cargo install bpf-linker --version 0.10.3 --locked

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --exclude e-navigator-ebpf-programs -- -D warnings

      - name: Test
        run: cargo test --locked --workspace --exclude e-navigator-ebpf-programs

      - name: Build
        run: cargo build --locked --workspace --exclude e-navigator-ebpf-programs

  supply-chain:
    name: Supply-chain checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Cargo deny
        run: cargo deny check

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: Cargo machete
        run: cargo machete

  manifests:
    name: Kubernetes manifest checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate manifests
        run: |
          kubectl apply --dry-run=client -f deploy/kubernetes/namespace.yaml
          kubectl apply --dry-run=client -f deploy/kubernetes/rbac.yaml
          kubectl apply --dry-run=client -f deploy/kubernetes/configmap.yaml
          kubectl apply --dry-run=client -f deploy/kubernetes/daemonset.yaml
