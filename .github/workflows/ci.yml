name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install eBPF build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm
          rustup toolchain install nightly --component rust-src
          cargo install bpf-linker --version 0.10.3 --locked

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --exclude e-navigator-ebpf-programs -- -D warnings

      - name: Test
        run: cargo test --locked --workspace --exclude e-navigator-ebpf-programs

      - name: Build
        run: cargo build --locked --workspace --exclude e-navigator-ebpf-programs

      - name: Synthetic run
        run: cargo run --locked -p e-navigator-cli -- --source synthetic

  supply-chain:
    name: Supply-chain checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Cargo deny
        run: cargo deny check

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        run: cargo audit

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: Cargo machete
        run: cargo machete

  manifests:
    name: Kubernetes and Helm checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Install kubeconform
        run: |
          go install github.com/yannh/kubeconform/cmd/kubeconform@v0.8.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Validate Helm chart
        run: |
          helm lint charts/e-navigator
          helm template e-navigator charts/e-navigator

      - name: Validate manifests
        run: |
          kubeconform -strict -summary deploy/kubernetes/*.yaml
          helm template e-navigator charts/e-navigator | kubeconform -strict -summary -

  docker:
    name: Docker smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -f Containerfile -t e-navigator:local .

      - name: Synthetic image run
        run: docker run --rm e-navigator:local --source synthetic

      - name: Docker smoke
        run: tests/smoke_docker.sh e-navigator:local
