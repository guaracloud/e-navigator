name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  E_NAVIGATOR_BPF_TOOLCHAIN: nightly-2026-07-01
  HELM_VERSION: v4.2.2
  RUST_VERSION: 1.96.0

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07-10
        with:
          components: clippy,rustfmt
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Documentation and website contracts
        run: |
          python3 scripts/check_docs.py
          node website/check-links.mjs

      - name: Install eBPF build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm
          rustup toolchain install "$E_NAVIGATOR_BPF_TOOLCHAIN" --component rust-src
          cargo install bpf-linker --version 0.10.3 --locked

      - name: Release contract
        run: python3 scripts/release.py check

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --exclude e-navigator-ebpf-programs -- -D warnings

      - name: Rustdoc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --workspace --no-deps --exclude e-navigator-ebpf-programs

      - name: Test
        run: cargo test --locked --workspace --exclude e-navigator-ebpf-programs

      - name: Build
        run: cargo build --locked --workspace --exclude e-navigator-ebpf-programs

      - name: Fuzz target build check
        run: scripts/fuzz_check.sh

      - name: Synthetic run
        run: cargo run --locked -p e-navigator-cli -- --source synthetic

      - name: Production example config
        run: cargo run --locked -p e-navigator-cli -- --validate-config --config documentation/examples/production-performance.toml

      - name: Version contract
        run: |
          expected="$(python3 scripts/release.py version)"
          actual="$(cargo run --locked -q -p e-navigator-cli -- --version)"
          test "$actual" = "e-navigator $expected"

  supply-chain:
    name: Supply-chain checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07-10
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.9 --locked

      - name: Cargo deny
        run: cargo deny check

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Cargo audit
        run: cargo audit

      - name: Install cargo-machete
        run: cargo install cargo-machete --version 0.9.2 --locked

      - name: Cargo machete
        run: cargo machete

  manifests:
    name: Kubernetes and Helm checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Install Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          cache: false
          go-version: "1.26.4"

      - name: Install kubeconform
        run: |
          go install github.com/yannh/kubeconform/cmd/kubeconform@v0.8.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Lint GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 .github/workflows/*.yml

      - name: Validate Helm chart
        run: |
          helm lint charts/e-navigator
          helm template e-navigator charts/e-navigator
          python3 scripts/release.py check

      - name: Validate manifests
        run: |
          kubeconform -strict -summary deploy/kubernetes/*.yaml
          helm template e-navigator charts/e-navigator | kubeconform -strict -summary -

  docker:
    name: Docker smoke
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Build image
        run: docker build -f Containerfile -t e-navigator:local .

      - name: Synthetic image run
        run: docker run --rm e-navigator:local --source synthetic

      - name: Versioned image run
        run: |
          expected="$(python3 scripts/release.py version)"
          actual="$(docker run --rm e-navigator:local --version)"
          test "$actual" = "e-navigator $expected"

      - name: Docker smoke
        run: tests/smoke_docker.sh e-navigator:local
