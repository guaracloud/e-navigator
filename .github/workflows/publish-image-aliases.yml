name: publish-image-aliases

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to alias, for example v0.1.0
        required: true
        type: string
      publish_latest:
        description: Also move latest; allowed only for a stable release
        required: true
        default: false
        type: boolean

concurrency:
  group: publish-image-aliases-${{ inputs.release_tag }}
  cancel-in-progress: false

env:
  BUILDX_VERSION: v0.33.0
  BUILDKIT_IMAGE: docker.io/moby/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Validate release tag
        id: version
        env:
          PUBLISH_LATEST: ${{ inputs.publish_latest }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]
          semver="${RELEASE_TAG#v}"
          if [ "$PUBLISH_LATEST" = true ] && [[ "$semver" == *-* ]]; then
            echo 'latest cannot point at a prerelease' >&2
            exit 1
          fi
          echo "semver=$semver" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          version: ${{ env.BUILDX_VERSION }}
          driver-opts: image=${{ env.BUILDKIT_IMAGE }}

      - name: Publish and verify aliases
        env:
          PUBLISH_LATEST: ${{ inputs.publish_latest }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SEMVER: ${{ steps.version.outputs.semver }}
        run: |
          set -euo pipefail
          source_digest="$(docker buildx imagetools inspect \
            "$IMAGE:$RELEASE_TAG" --format '{{.Manifest.Digest}}')"
          test -n "$source_digest"
          aliases=("$SEMVER")
          if [ "$PUBLISH_LATEST" = true ]; then
            aliases+=(latest)
          fi
          for alias in "${aliases[@]}"; do
            docker buildx imagetools create \
              --tag "$IMAGE:$alias" \
              "$IMAGE@$source_digest"
            alias_digest="$(docker buildx imagetools inspect \
              "$IMAGE:$alias" --format '{{.Manifest.Digest}}')"
            test "$alias_digest" = "$source_digest"
            echo "$IMAGE:$alias -> $source_digest"
          done
