log_level = "info"
queue_capacity = 8192

[source_supervisor]
failure_policy = "isolate"
shutdown_timeout_millis = 10000

[ebpf]
event_transport = "ring_buffer"
ring_buffer_bytes = 262144
network_io_hook = "auto"

[attribution]
procfs_root = "/host/proc"
cgroup_root = "/host/cgroup"

[attribution.kubernetes]
enabled = false
token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
ca_cert_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
namespace_allowlist = []
namespace_denylist = []
node_name_allowlist = []
node_name_denylist = []
pod_label_selector = {}
pod_label_exclude_selector = {}

[capture_filter]
enabled = true
default_posture = "allow"
unknown_cgroup = "allow"

[json_stdout]
mode = "all"

[prometheus_http]
enabled = true
bind_address = "0.0.0.0"
port = 9090
max_metric_lines = 4096
metrics_enabled = true
profiles_enabled = false

[[modules]]
name = "source.aya_exec"
enabled = true

[[modules]]
name = "sink.json_stdout"
enabled = true

[[modules]]
name = "sink.prometheus_http"
enabled = true
