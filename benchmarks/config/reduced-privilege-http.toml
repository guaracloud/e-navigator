log_level = "info"
queue_capacity = 8192

[source_supervisor]
failure_policy = "fail_fast"
shutdown_timeout_millis = 10000

[ebpf]
event_transport = "ring_buffer"
ring_buffer_bytes = 262144
network_io_hook = "auto"

[attribution]
procfs_root = "/host/proc"
cgroup_root = "/host/cgroup"

[attribution.kubernetes]
enabled = false

[http_source]
max_header_bytes = 8192
max_request_line_bytes = 1024
max_attributes = 8
max_tracestate_bytes = 512
inbound_enabled = true

[json_stdout]
mode = "all"

[prometheus_http]
enabled = true
bind_address = "0.0.0.0"
port = 9090
max_metric_lines = 4096
metrics_enabled = true
profiles_enabled = false

[[modules]]
name = "source.aya_http"
enabled = true

[[modules]]
name = "sink.json_stdout"
enabled = true

[[modules]]
name = "sink.prometheus_http"
enabled = true
