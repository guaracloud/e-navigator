log_level = "info"
queue_capacity = 8192

[source_supervisor]
failure_policy = "fail_fast"
shutdown_timeout_millis = 10000

[attribution]
procfs_root = "/host/proc"
cgroup_root = "/host/cgroup"

[attribution.kubernetes]
enabled = false

[resource_source]
procfs_root = "/host/proc"
sysfs_root = "/sys"
cgroup_root = "/host/cgroup"
sample_interval_millis = 1000
max_processes = 64
max_cgroups = 64
max_fds_per_process = 256
max_file_bytes = 131072

[json_stdout]
mode = "all"

[prometheus_http]
enabled = true
bind_address = "0.0.0.0"
port = 9090
max_metric_lines = 4096
metrics_enabled = true
profiles_enabled = false

[[modules]]
name = "source.host_resource"
enabled = true

[[modules]]
name = "sink.json_stdout"
enabled = true

[[modules]]
name = "sink.prometheus_http"
enabled = true
