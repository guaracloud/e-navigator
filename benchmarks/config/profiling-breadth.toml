log_level = "info"
queue_capacity = 8192

[source_supervisor]
failure_policy = "fail_fast"
shutdown_timeout_millis = 10000

[ebpf]
event_transport = "ring_buffer"
ring_buffer_bytes = 524288
network_io_hook = "auto"

[attribution]
procfs_root = "/host/proc"
cgroup_root = "/host/cgroup"

[attribution.kubernetes]
enabled = true
token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
ca_cert_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
namespace_allowlist = []
namespace_denylist = []
node_name_allowlist = []
node_name_denylist = []
pod_label_selector = {}
pod_label_exclude_selector = {}

[capture_filter]
enabled = true
default_posture = "deny"
unknown_cgroup = "deny"
namespace_include = ["e-navigator-bench"]
label_include = { "app.kubernetes.io/component" = "profiling-load" }
label_exclude = { "app.kubernetes.io/name" = "e-navigator" }

[cpu_profile_source]
enabled = true
module_name = "source.aya_cpu_profile"
sample_frequency_hz = 11
off_cpu_enabled = true
lock_enabled = true
off_cpu_min_duration_micros = 1000
lock_min_duration_micros = 500
max_off_cpu_events_per_second_per_cpu = 4
max_lock_events_per_second_per_cpu = 4
max_active_targets = 128
max_frames_per_sample = 48
max_samples_per_batch = 256
max_symbol_bytes = 256
max_module_bytes = 256
max_file_bytes = 256
backpressure = "drop_newest"
symbolize = true
resolve_symbol_names = true
dwarf_unwind = true
max_unwind_processes = 256

[profiling]
max_windows = 4096
max_seen_samples = 8192
max_warnings = 1024
window_nanos = 10000000000

[json_stdout]
mode = "all"

[prometheus_http]
enabled = true
bind_address = "0.0.0.0"
port = 9090
max_metric_lines = 4096
metrics_enabled = true
profiles_enabled = true

[[modules]]
name = "source.aya_cpu_profile"
enabled = true

[[modules]]
name = "processor.container_attribution"
enabled = true

[[modules]]
name = "generator.profiling"
enabled = true

[[modules]]
name = "sink.json_stdout"
enabled = true

[[modules]]
name = "sink.prometheus_http"
enabled = true
