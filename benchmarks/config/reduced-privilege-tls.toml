log_level = "info"
queue_capacity = 8192

[source_supervisor]
failure_policy = "fail_fast"
shutdown_timeout_millis = 10000

[ebpf]
event_transport = "ring_buffer"
ring_buffer_bytes = 262144
network_io_hook = "auto"

[attribution]
procfs_root = "/host/proc"
cgroup_root = "/host/cgroup"

[attribution.kubernetes]
enabled = false

[tls_source]
http1_ports = [8443]
http2_ports = []
kafka_ports = []
mongodb_ports = []
mysql_ports = []
nats_ports = []
postgresql_ports = []
redis_ports = []
capture_bytes_per_call = 4096
max_tracked_connections = 4096
max_buffered_bytes_per_connection = 16384
max_attributes = 16

[json_stdout]
mode = "all"

[prometheus_http]
enabled = true
bind_address = "0.0.0.0"
port = 9090
max_metric_lines = 4096
metrics_enabled = true
profiles_enabled = false

[[modules]]
name = "source.aya_tls"
enabled = true

[[modules]]
name = "sink.json_stdout"
enabled = true

[[modules]]
name = "sink.prometheus_http"
enabled = true
