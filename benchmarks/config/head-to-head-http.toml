# Generated stage contract for the guarded homelab head-to-head campaign.
log_level = "info"
queue_capacity = 8192

[source_supervisor]
failure_policy = "fail_fast"
shutdown_timeout_millis = 20000

[ebpf]
event_transport = "auto"
ring_buffer_bytes = 524288
network_io_hook = "auto"

[attribution]
procfs_root = "/host/proc"
cgroup_root = "/host/cgroup"

[attribution.kubernetes]
enabled = true
token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
ca_cert_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
namespace_allowlist = []
namespace_denylist = []
node_name_allowlist = []
node_name_denylist = []
pod_label_selector = {}
pod_label_exclude_selector = {}

[capture_filter]
enabled = true
default_posture = "deny"
unknown_cgroup = "deny"
discovery_mode = "event_driven"
namespace_include = ["e-navigator-bench"]
label_in = { "e-navigator.dev/component" = ["http"] }
process_exclude = ["enav-load", "enav-otlp-sink", "e-navigator*"]

[http_source]
max_header_bytes = 8192
max_request_line_bytes = 1024
max_attributes = 16
max_tracestate_bytes = 512
inbound_enabled = true

[protocol_source]
inbound_enabled = true
http1_ports = []
http2_ports = []
kafka_ports = []
mongodb_ports = []
mysql_ports = []
nats_ports = []
postgresql_ports = []
redis_ports = []
max_buffered_bytes_per_connection = 8192
capture_bytes_per_syscall = 1024
max_tracked_connections = 8192
max_attributes = 16

[cpu_profile_source]
enabled = false
module_name = "source.aya_cpu_profile"
sample_frequency_hz = 10
off_cpu_enabled = false
lock_enabled = false
off_cpu_min_duration_micros = 1000
lock_min_duration_micros = 1000
max_off_cpu_events_per_second_per_cpu = 64
max_lock_events_per_second_per_cpu = 64
max_active_targets = 128
max_frames_per_sample = 96
max_samples_per_batch = 128
max_symbol_bytes = 256
max_module_bytes = 256
max_file_bytes = 256
backpressure = "drop_newest"
symbolize = true
resolve_symbol_names = true
dwarf_unwind = true
max_unwind_processes = 256

[trace_correlation]
max_service_paths = 4096
max_seen_interactions = 8192
max_warnings = 1024

[request_correlation]
generate_trace_ids = true
max_seen_requests = 16384
max_warnings = 1024

[profiling]
max_windows = 4096
max_seen_samples = 8192
max_warnings = 1024
window_nanos = 15000000000

[prometheus_http]
enabled = true
bind_address = "0.0.0.0"
port = 9090
max_metric_lines = 8192
metrics_enabled = true
profiles_enabled = false

[otlp_http]
enabled = true
endpoint = ""
metrics_endpoint = ""
traces_endpoint = "http://head-to-head-otlp-sink.e-navigator-bench.svc.cluster.local:4318/v1/traces"
profiles_endpoint = "http://pyroscope.e-navigator-system.svc.cluster.local:4040/v1development/profiles"
metrics_enabled = false
traces_enabled = true
profiles_enabled = false
queue_capacity = 8192
batch_size = 4096
flush_interval_millis = 1000
timeout_millis = 3000
max_retries = 3
compression = "gzip"
retry_initial_backoff_millis = 100
retry_max_backoff_millis = 5000
circuit_breaker_failure_threshold = 5
circuit_breaker_cooldown_millis = 30000
shutdown_timeout_millis = 20000
tls_insecure_skip_verify = false

[[modules]]
name = "source.aya_http"
enabled = true

[[modules]]
name = "processor.container_attribution"
enabled = true

[[modules]]
name = "generator.trace_correlation"
enabled = true

[[modules]]
name = "generator.request_correlation"
enabled = true

[[modules]]
name = "sink.prometheus_http"
enabled = true

[[modules]]
name = "sink.otlp_http"
enabled = true
