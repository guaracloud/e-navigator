apiVersion: batch/v1
kind: Job
metadata:
  name: e-navigator-bench-workload
  namespace: e-navigator-bench
  labels:
    app.kubernetes.io/name: e-navigator-bench-workload
    app.kubernetes.io/component: bootstrap-window-load
    app.kubernetes.io/part-of: e-navigator-validation
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 240 # Replaced by the guarded collector.
  template:
    metadata:
      labels:
        app.kubernetes.io/name: e-navigator-bench-workload
        app.kubernetes.io/component: bootstrap-window-load
        app.kubernetes.io/part-of: e-navigator-validation
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: homelab-01
      tolerations:
        - operator: Exists
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap-window-load
          image: docker.io/library/python@sha256:5c34b355088846dddc8afb7442c20b9433dccdc8d66192dc52c616adeaa106a3
          imagePullPolicy: IfNotPresent
          env:
            - name: DURATION_SECONDS
              value: "120" # Replaced by the guarded collector.
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          command: ["python", "-u", "-c"]
          args:
            - |
              import json
              import os
              import subprocess
              import time

              duration = int(os.environ["DURATION_SECONDS"])
              probe = "/tmp/e-navigator-bootstrap-probe"
              os.symlink("/bin/true", probe)
              started_unix_nanos = time.time_ns()
              started_monotonic = time.monotonic()
              print(json.dumps({
                  "schema": "e-navigator.bootstrap-window-start.v1",
                  "started_unix_nanos": started_unix_nanos,
                  "uid": os.getuid(),
              }, sort_keys=True), flush=True)

              attempts = 0
              failures = 0
              deadline = started_monotonic + duration
              while time.monotonic() < deadline:
                  attempts += 1
                  try:
                      subprocess.run([probe], check=True, timeout=1)
                  except Exception:
                      failures += 1
                  time.sleep(0.01)

              elapsed = time.monotonic() - started_monotonic
              print(json.dumps({
                  "schema": "e-navigator.bootstrap-window-workload.v1",
                  "attempts": attempts,
                  "duration_seconds": duration,
                  "elapsed_seconds": round(elapsed, 6),
                  "failures": failures,
                  "started_unix_nanos": started_unix_nanos,
                  "uid": os.getuid(),
              }, sort_keys=True), flush=True)
              if failures or attempts < duration * 20:
                  raise SystemExit(
                      f"bootstrap workload failed: attempts={attempts} failures={failures}"
                  )
          resources:
            requests:
              cpu: 100m
              memory: 32Mi
            limits:
              cpu: "1"
              memory: 128Mi
