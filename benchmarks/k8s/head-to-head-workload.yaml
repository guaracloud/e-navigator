apiVersion: batch/v1
kind: CronJob
metadata:
  name: head-to-head-load-template
  namespace: e-navigator-bench
  labels:
    app.kubernetes.io/part-of: e-navigator-head-to-head
    e-navigator.dev/disposable: "true"
spec:
  schedule: "0 0 1 1 *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: head-to-head-load
        app.kubernetes.io/part-of: e-navigator-head-to-head
        e-navigator.dev/disposable: "true"
        e-navigator.dev/load-generator: "true"
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 420
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: head-to-head-load
            app.kubernetes.io/part-of: e-navigator-head-to-head
            e-navigator.dev/component: load-generator
            e-navigator.dev/disposable: "true"
            e-navigator.dev/load-generator: "true"
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/hostname: homelab-01
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: load
              image: docker.io/library/e-navigator-head-to-head:gap9-amd64
              imagePullPolicy: Never
              args: ["load"]
              env:
                - name: NODE_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: spec.nodeName
                - name: HEAD2HEAD_WARMUP_SECONDS
                  value: "15"
                - name: HEAD2HEAD_DURATION_SECONDS
                  value: "45"
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: "1"
                  memory: 128Mi
                limits:
                  cpu: "4"
                  memory: 512Mi
