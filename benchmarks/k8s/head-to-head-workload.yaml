apiVersion: apps/v1
kind: Deployment
metadata:
  name: head-to-head-http
  namespace: e-navigator-bench
  labels:
    app.kubernetes.io/part-of: e-navigator-head-to-head
    e-navigator.dev/disposable: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: head-to-head-http
  template:
    metadata:
      labels:
        app.kubernetes.io/name: head-to-head-http
        app.kubernetes.io/part-of: e-navigator-head-to-head
        e-navigator.dev/component: http
        e-navigator.dev/disposable: "true"
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: homelab-02
      tolerations:
        - operator: Exists
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: workload
          image: docker.io/library/e-navigator-head-to-head:gap9-amd64
          imagePullPolicy: Never
          args: ["http"]
          ports:
            - name: http
              containerPort: 18080
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: head-to-head-http
  namespace: e-navigator-bench
  labels:
    app.kubernetes.io/part-of: e-navigator-head-to-head
    e-navigator.dev/disposable: "true"
spec:
  selector:
    app.kubernetes.io/name: head-to-head-http
  ports:
    - name: http
      port: 18080
      targetPort: http
---
