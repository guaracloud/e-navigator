apiVersion: apps/v1
kind: Deployment
metadata:
  name: head-to-head-postgres
  namespace: e-navigator-bench
  labels:
    app.kubernetes.io/part-of: e-navigator-head-to-head
    e-navigator.dev/disposable: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: head-to-head-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: head-to-head-postgres
        app.kubernetes.io/part-of: e-navigator-head-to-head
        e-navigator.dev/component: backend
        e-navigator.dev/disposable: "true"
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: homelab-02
      tolerations:
        - operator: Exists
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: docker.io/library/postgres@sha256:cc9f4143a8d2fa8cf3749d0cb4d26ecf2d53a77a2ac807e9ebd67ae22426221a
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_HOST_AUTH_METHOD
              value: trust
            - name: POSTGRES_USER
              value: bench
            - name: POSTGRES_DB
              value: bench
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "bench", "-d", "bench"]
            periodSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
