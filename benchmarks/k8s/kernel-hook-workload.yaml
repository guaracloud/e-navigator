apiVersion: batch/v1
kind: Job
metadata:
  name: e-navigator-bench-workload
  namespace: e-navigator-bench
  labels:
    app.kubernetes.io/name: e-navigator-bench-workload
    app.kubernetes.io/component: load
    app.kubernetes.io/part-of: e-navigator-validation
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 240 # Replaced by the guarded collector.
  template:
    metadata:
      labels:
        app.kubernetes.io/name: e-navigator-bench-workload
        app.kubernetes.io/component: load
        app.kubernetes.io/part-of: e-navigator-validation
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: homelab-01
      tolerations:
        - operator: Exists
      containers:
        - name: load
          image: docker.io/library/python:3.12.10-alpine3.21@sha256:9c51ecce261773a684c8345b2d4673700055c513b4d54bc0719337d3e4ee552e
          env:
            - name: DURATION_SECONDS
              value: "120" # Replaced by the guarded collector.
          command: ["python", "-u", "-c"]
          args:
            - |
              import hashlib
              import json
              import os
              import socket
              import threading
              import time

              duration = int(os.environ["DURATION_SECONDS"])
              discovery_wait_seconds = 5
              payload = bytes((index % 251 for index in range(256)))
              latency_bounds_us = [10, 20, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 50000]
              latency_buckets = [0 for _ in latency_bounds_us]
              listener = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              listener.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
              listener.bind(("127.0.0.1", 0))
              listener.listen(1)
              port = listener.getsockname()[1]
              server_errors = []

              def write_exact(fd, data):
                  offset = 0
                  while offset < len(data):
                      written = os.write(fd, data[offset:])
                      if written <= 0:
                          raise RuntimeError("write returned no progress")
                      offset += written

              def read_exact(fd, size):
                  chunks = bytearray()
                  while len(chunks) < size:
                      chunk = os.read(fd, size - len(chunks))
                      if not chunk:
                          raise RuntimeError("unexpected EOF")
                      chunks.extend(chunk)
                  return bytes(chunks)

              def echo_server():
                  try:
                      connection, _address = listener.accept()
                      with connection:
                          fd = connection.fileno()
                          while True:
                              chunk = os.read(fd, len(payload))
                              if not chunk:
                                  break
                              write_exact(fd, chunk)
                  except Exception as error:
                      server_errors.append(type(error).__name__ + ": " + str(error))
                  finally:
                      listener.close()

              server = threading.Thread(target=echo_server, name="bounded-echo", daemon=True)
              server.start()
              # The capture filter is cgroup keyed. Give the guarded benchmark
              # agent time to observe this newly created pod before the single
              # measured connection is opened; Gap 8 measures this window
              # independently rather than contaminating this hook comparison.
              time.sleep(discovery_wait_seconds)
              client = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              client.connect(("127.0.0.1", port))
              client_fd = client.fileno()
              operations = 0
              latency_sum_us = 0.0
              latency_max_us = 0.0
              started = time.monotonic()
              deadline = started + duration
              while time.monotonic() < deadline:
                  operation_started = time.perf_counter_ns()
                  write_exact(client_fd, payload)
                  echoed = read_exact(client_fd, len(payload))
                  if echoed != payload:
                      raise RuntimeError("echo payload mismatch")
                  elapsed_us = (time.perf_counter_ns() - operation_started) / 1000.0
                  operations += 1
                  latency_sum_us += elapsed_us
                  latency_max_us = max(latency_max_us, elapsed_us)
                  for index, bound in enumerate(latency_bounds_us):
                      if elapsed_us <= bound:
                          latency_buckets[index] += 1
                          break

              elapsed = time.monotonic() - started
              expected_bytes = operations * len(payload)
              client.shutdown(socket.SHUT_WR)
              client.close()
              server.join(timeout=5)
              if server.is_alive():
                  raise RuntimeError("echo server did not stop")
              if server_errors:
                  raise RuntimeError(server_errors[0])

              def percentile_upper_bound(fraction):
                  target = max(1, int(operations * fraction + 0.999999))
                  cumulative = 0
                  for bound, count in zip(latency_bounds_us, latency_buckets):
                      cumulative += count
                      if cumulative >= target:
                          return bound
                  return latency_max_us

              print(json.dumps({
                  "schema": "e-navigator.kernel-hook-workload.v1",
                  "duration_seconds": duration,
                  "discovery_wait_seconds": discovery_wait_seconds,
                  "elapsed_seconds": round(elapsed, 6),
                  "operations": operations,
                  "payload_bytes": len(payload),
                  "payload_sha256": hashlib.sha256(payload).hexdigest(),
                  "bytes_sent": expected_bytes,
                  "bytes_received": expected_bytes,
                  "throughput_operations_per_second": round(operations / elapsed, 3),
                  "latency_mean_us": round(latency_sum_us / operations, 6),
                  "latency_p50_upper_bound_us": percentile_upper_bound(0.50),
                  "latency_p95_upper_bound_us": percentile_upper_bound(0.95),
                  "latency_p99_upper_bound_us": percentile_upper_bound(0.99),
                  "latency_max_us": round(latency_max_us, 6),
                  "histogram_bounds_us": latency_bounds_us,
                  "histogram_counts": latency_buckets,
                  "client_fd": client_fd,
                  "server_port": port,
              }, sort_keys=True))
          resources:
            requests:
              cpu: 250m
              memory: 32Mi
            limits:
              cpu: "1"
              memory: 128Mi
