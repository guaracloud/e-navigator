apiVersion: v1
kind: Pod
metadata:
  name: allocation-probe-homelab01
  namespace: e-navigator-bench
  labels:
    app.kubernetes.io/name: e-navigator-allocation-probe
    app.kubernetes.io/part-of: e-navigator-allocation-diagnostic
spec:
  activeDeadlineSeconds: 1800
  automountServiceAccountToken: false
  hostPID: true
  nodeName: homelab-01
  restartPolicy: Never
  tolerations:
    - operator: Exists
  containers:
    - name: profiler
      image: docker.io/library/debian@sha256:63a496b5d3b99214b39f5ed70eb71a61e590a77979c79cbee4faf991f8c0783e
      command: ["sleep", "1800"]
      securityContext:
        privileged: true
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: "1"
          memory: 1Gi
      volumeMounts:
        - name: host-root
          mountPath: /host
          readOnly: true
  volumes:
    - name: host-root
      hostPath:
        path: /
        type: Directory
---
