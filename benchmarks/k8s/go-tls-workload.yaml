apiVersion: apps/v1
kind: Deployment
metadata:
  name: e-navigator-bench-workload-server
  namespace: e-navigator-bench
  labels:
    app.kubernetes.io/name: e-navigator-bench-workload
    app.kubernetes.io/component: go-tls-server
    app.kubernetes.io/part-of: e-navigator-validation
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: e-navigator-bench-workload
      app.kubernetes.io/component: go-tls-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: e-navigator-bench-workload
        app.kubernetes.io/component: go-tls-server
        app.kubernetes.io/part-of: e-navigator-validation
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: e-navigator-bench-workload
              app.kubernetes.io/component: go-tls-server
      tolerations:
        - operator: Exists
      containers:
        - name: server
          image: docker.io/library/e-navigator-go-tls:gap3-20260721
          imagePullPolicy: Never
          args: ["--mode=server", "--listen=:8443"]
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: https
            periodSeconds: 1
            timeoutSeconds: 1
            failureThreshold: 30
          resources:
            requests:
              cpu: 25m
              memory: 24Mi
            limits:
              cpu: "1"
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: e-navigator-bench-workload-go-tls
  namespace: e-navigator-bench
  labels:
    app.kubernetes.io/name: e-navigator-bench-workload
    app.kubernetes.io/component: go-tls-server
    app.kubernetes.io/part-of: e-navigator-validation
spec:
  selector:
    app.kubernetes.io/name: e-navigator-bench-workload
    app.kubernetes.io/component: go-tls-server
  ports:
    - name: https
      port: 8443
      targetPort: https
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: e-navigator-bench-workload-stripped
  namespace: e-navigator-bench
  labels:
    app.kubernetes.io/name: e-navigator-bench-workload
    app.kubernetes.io/component: go-tls-stripped
    app.kubernetes.io/part-of: e-navigator-validation
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: e-navigator-bench-workload
      app.kubernetes.io/component: go-tls-stripped
  template:
    metadata:
      labels:
        app.kubernetes.io/name: e-navigator-bench-workload
        app.kubernetes.io/component: go-tls-stripped
        app.kubernetes.io/part-of: e-navigator-validation
    spec:
      nodeSelector:
        kubernetes.io/hostname: homelab-02
      tolerations:
        - operator: Exists
      containers:
        - name: server
          image: docker.io/library/e-navigator-go-tls:gap3-20260721
          imagePullPolicy: Never
          command: ["/usr/local/bin/go-https-proof-stripped"]
          args: ["--mode=server", "--listen=:8444"]
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: 8444
            periodSeconds: 1
            timeoutSeconds: 1
            failureThreshold: 30
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 250m
              memory: 64Mi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: e-navigator-bench-workload
  namespace: e-navigator-bench
  labels:
    app.kubernetes.io/name: e-navigator-bench-workload
    app.kubernetes.io/component: go-tls-load
    app.kubernetes.io/part-of: e-navigator-validation
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 240 # Replaced by the guarded collector.
  template:
    metadata:
      labels:
        app.kubernetes.io/name: e-navigator-bench-workload
        app.kubernetes.io/component: go-tls-load
        app.kubernetes.io/part-of: e-navigator-validation
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: homelab-01
      tolerations:
        - operator: Exists
      containers:
        - name: load
          image: docker.io/library/e-navigator-go-tls:gap3-20260721
          imagePullPolicy: Never
          args:
            - "--mode=client"
            - "--url=https://e-navigator-bench-workload-go-tls:8443"
            - "--requests=4000"
            - "--concurrency=16"
            - "--startup-delay=20s"
          env:
            - name: DURATION_SECONDS
              value: "120" # Replaced by the guarded collector.
          resources:
            requests:
              cpu: 100m
              memory: 32Mi
            limits:
              cpu: "2"
              memory: 192Mi
