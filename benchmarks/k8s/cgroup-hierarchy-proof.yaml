apiVersion: batch/v1
kind: Job
metadata:
  name: e-navigator-cgroup-proof-execs
  namespace: e-navigator-bench
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: e-navigator-cgroup-proof-execs
    spec:
      nodeSelector:
        kubernetes.io/hostname: homelab-01
      tolerations:
        - operator: Exists
      restartPolicy: Never
      containers:
        - name: execs
          image: busybox:1.36.1
          command:
            - /bin/sh
            - -c
            - 'i=0; while [ "$i" -lt 300 ]; do /bin/echo proof >/dev/null; i=$((i + 1)); done'
