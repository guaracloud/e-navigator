apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: e-navigator-homelab-image-loader
  namespace: e-navigator-bench
  labels:
    app.kubernetes.io/name: e-navigator-homelab-image-loader
    app.kubernetes.io/part-of: e-navigator-validation
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: e-navigator-homelab-image-loader
  template:
    metadata:
      labels:
        app.kubernetes.io/name: e-navigator-homelab-image-loader
        app.kubernetes.io/part-of: e-navigator-validation
    spec:
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: loader
          image: docker.io/library/python:3.12.10-alpine3.21@sha256:9c51ecce261773a684c8345b2d4673700055c513b4d54bc0719337d3e4ee552e
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c", "trap 'exit 0' TERM INT; while :; do sleep 3600 & wait $!; done"]
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: host-root
              mountPath: /host
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
