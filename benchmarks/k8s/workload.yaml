apiVersion: batch/v1
kind: Job
metadata:
  name: e-navigator-bench-workload
  namespace: e-navigator-bench
  labels:
    app.kubernetes.io/name: e-navigator-bench-workload
    app.kubernetes.io/part-of: e-navigator-validation
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: e-navigator-bench-workload
        app.kubernetes.io/part-of: e-navigator-validation
    spec:
      restartPolicy: Never
      containers:
        - name: workload
          image: docker.io/busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              end_epoch=$(( $(date +%s) + 120 ))
              for i in $(seq 1 60); do
                echo "e-navigator-bench exec ${i}"
                nslookup kubernetes.default.svc.cluster.local >/dev/null 2>&1 || true
                wget -qO- --timeout=2 http://kubernetes.default.svc >/dev/null 2>&1 || true
                while [ "$(date +%s)" -lt "${end_epoch}" ]; do
                  n=0
                  while [ "${n}" -lt 2000 ]; do
                    n=$((n + 1))
                  done
                  break
                done
                sleep 1
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
